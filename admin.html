<!DOCTYPE html>

<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Charan Tours Admin Panel</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f5f5f5;
}

.card{
border:none;
box-shadow:0 0 10px rgba(0,0,0,.2);
}

table{
background:white;
}

</style>

</head>

<body>

<script>

if(localStorage.getItem("admin") !== "true"){

window.location.href = "admin-login.html";

}

</script>

<div class="container mt-4">

<div class="d-flex justify-content-between align-items-center">

<h2>Charan Tours Admin Dashboard</h2>

<button class="btn btn-danger" onclick="logout()">
Logout
</button>

</div>

<hr>

<div class="row">

<div class="col-md-2 mb-3">
<div class="card bg-primary text-white text-center">
<div class="card-body">
<h3 id="totalBookings">0</h3>
<p>Total Bookings</p>
</div>
</div>
</div>

<div class="col-md-2 mb-3">
<div class="card bg-info text-white text-center">
<div class="card-body">
<h3 id="totalUsers">0</h3>
<p>Total Users</p>
</div>
</div>
</div>

<div class="col-md-2 mb-3">
<div class="card bg-warning text-dark text-center">
<div class="card-body">
<h3 id="pendingBookings">0</h3>
<p>Pending</p>
</div>
</div>
</div>

<div class="col-md-3 mb-3">
<div class="card bg-success text-white text-center">
<div class="card-body">
<h3 id="approvedBookings">0</h3>
<p>Approved</p>
</div>
</div>
</div>

<div class="col-md-3 mb-3">
<div class="card bg-danger text-white text-center">
<div class="card-body">
<h3 id="rejectedBookings">0</h3>
<p>Rejected</p>
</div>
</div>
</div>

</div>

<hr>

<h3 class="mb-3">Booking Records</h3>

<div class="table-responsive">

<table class="table table-bordered table-striped">

<thead class="table-dark">

<tr>

<th>Booking ID</th>
<th>Name</th>
<th>Phone</th>
<th>Email</th>
<th>Place</th>
<th>Total</th>
<th>Status</th>
<th>Actions</th>

</tr>

</thead>

<tbody id="bookingTable">

</tbody>

</table>

</div>

<hr>

<h3 class="mb-3">User Login Records</h3>

<div class="table-responsive">

<table class="table table-bordered table-striped">

<thead class="table-dark">

<tr>
<th>User Name</th>
<th>Phone Number</th>
<th>Login Time</th>
<th>Action</th>
</tr>

</thead>

<tbody id="loginTable">

</tbody>

</table>

</div>

<script type="module" src="admin.js"></script>

</body>
</html>
